apiVersion: apps/v1
kind: Deployment
metadata:
  name: workshop-app
  namespace: aks-workshop-pipeline
spec:
  replicas: 2
  selector:
    matchLabels:
      app: workshop-app
  template:
    metadata:
      labels:
        app: workshop-app
    spec:
      containers:
        - name: workshop-app
          image: <ACR_NAME>.azurecr.io/workshop-app:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: workshop-app-config
          readinessProbe:
            httpGet:
              path: /readyz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 20

