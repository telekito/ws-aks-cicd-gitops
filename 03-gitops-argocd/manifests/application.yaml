apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: workshop-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: <GIT_REPOSITORY_URL>
    targetRevision: main
    path: k8s-argo
  destination:
    server: https://kubernetes.default.svc
    namespace: aks-workshop-argo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

