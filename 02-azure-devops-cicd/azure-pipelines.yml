trigger:
  - main

variables:
  vmImage: ubuntu-latest
  imageRepository: workshop-app
  dockerfilePath: workshop-app/Dockerfile
  manifestPath: workshop-app/k8s-pipeline
  kubernetesNamespace: aks-workshop-pipeline
  acrName: <ACR_NAME>
  aksResourceGroup: <AKS_RESOURCE_GROUP>
  aksClusterName: <AKS_CLUSTER_NAME>

stages:
  - stage: Build
    displayName: 'Build and push image to ACR'
    jobs:
      - job: BuildAndPush
        displayName: 'Build Docker image and push to ACR'
        pool:
          vmImage: $(vmImage)
        steps:
          - task: AzureCLI@2
            displayName: Build and push image to ACR
            inputs:
              azureSubscription: <AZURE_DEVOPS_SERVICE_CONNECTION>
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail

                IMAGE="$(acrName).azurecr.io/$(imageRepository)"
                TAG_BUILD="$(Build.BuildId)"

                az acr login --name $(acrName)

                docker build \
                  -f $(dockerfilePath) \
                  -t ${IMAGE}:${TAG_BUILD} \
                  -t ${IMAGE}:latest \
                  workshop-app

                docker push ${IMAGE}:${TAG_BUILD}
                docker push ${IMAGE}:latest

  - stage: Deploy
    displayName: 'Deploy to AKS'
    dependsOn: Build
    jobs:
      - job: DeployToAKS
        displayName: 'Deploy application to AKS'
        pool:
          vmImage: $(vmImage)
        steps:
          - task: Bash@3
            displayName: Validate required Kubernetes manifests
            inputs:
              targetType: inline
              script: |
                set -euo pipefail

                REQUIRED_FILES=(
                  "$(manifestPath)/namespace.yaml"
                  "$(manifestPath)/configmap.yaml"
                  "$(manifestPath)/service.yaml"
                  "$(manifestPath)/deployment.yaml"
                )

                echo "Checking manifests in repo checkout..."
                ls -la "$(manifestPath)" || true

                for file in "${REQUIRED_FILES[@]}"; do
                  if [ ! -f "$file" ]; then
                    echo "ERROR: Missing required file: $file"
                    echo "Ensure the file exists in the repository and was committed/pushed to the branch being built."
                    exit 1
                  fi
                done

                echo "All required manifests are present."

          - task: Kubernetes@1
            displayName: Apply namespace
            inputs:
              connectionType: Azure Resource Manager
              azureSubscriptionEndpoint: <AZURE_DEVOPS_SERVICE_CONNECTION>
              azureResourceGroup: $(aksResourceGroup)
              kubernetesCluster: $(aksClusterName)
              command: apply
              useConfigurationFile: true
              configuration: $(manifestPath)/namespace.yaml

          - task: Kubernetes@1
            displayName: Apply ConfigMap
            inputs:
              connectionType: Azure Resource Manager
              azureSubscriptionEndpoint: <AZURE_DEVOPS_SERVICE_CONNECTION>
              azureResourceGroup: $(aksResourceGroup)
              kubernetesCluster: $(aksClusterName)
              command: apply
              useConfigurationFile: true
              configuration: $(manifestPath)/configmap.yaml

          - task: Kubernetes@1
            displayName: Apply Service
            inputs:
              connectionType: Azure Resource Manager
              azureSubscriptionEndpoint: <AZURE_DEVOPS_SERVICE_CONNECTION>
              azureResourceGroup: $(aksResourceGroup)
              kubernetesCluster: $(aksClusterName)
              command: apply
              useConfigurationFile: true
              configuration: $(manifestPath)/service.yaml

          - task: Kubernetes@1
            displayName: Apply Deployment
            inputs:
              connectionType: Azure Resource Manager
              azureSubscriptionEndpoint: <AZURE_DEVOPS_SERVICE_CONNECTION>
              azureResourceGroup: $(aksResourceGroup)
              kubernetesCluster: $(aksClusterName)
              command: apply
              useConfigurationFile: true
              configuration: $(manifestPath)/deployment.yaml

          - task: Kubernetes@1
            displayName: Update image tag
            inputs:
              connectionType: Azure Resource Manager
              azureSubscriptionEndpoint: <AZURE_DEVOPS_SERVICE_CONNECTION>
              azureResourceGroup: $(aksResourceGroup)
              kubernetesCluster: $(aksClusterName)
              command: set
              arguments: 'image deployment/workshop-app workshop-app=$(acrName).azurecr.io/$(imageRepository):$(Build.BuildId) -n $(kubernetesNamespace) --record'

          - task: Kubernetes@1
            displayName: Verify rollout
            inputs:
              connectionType: Azure Resource Manager
              azureSubscriptionEndpoint: <AZURE_DEVOPS_SERVICE_CONNECTION>
              azureResourceGroup: $(aksResourceGroup)
              kubernetesCluster: $(aksClusterName)
              command: rollout
              arguments: 'status deployment/workshop-app -n $(kubernetesNamespace)'
